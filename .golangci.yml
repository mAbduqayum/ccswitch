version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - misspell
    - nilerr
    - revive
    - unconvert
    - unparam
    - whitespace
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln

  exclusions:
    rules:
      # These packages are all internal (no public API surface), so revive's
      # demand for a doc comment on every exported symbol / package is noise.
      # Its other rules stay active.
      - linters: [revive]
        text: "should have comment|should have a package comment"

formatters:
  enable:
    - gofumpt
    - goimports
