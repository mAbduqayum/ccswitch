# GoReleaser config — https://goreleaser.com
# Releases are cut by merging the release-please PR; that tags the merge
# commit and the release-please workflow runs GoReleaser against it.
version: 2

project_name: ccswitch

before:
  hooks:
    - go mod tidy
    - ./scripts/completions.sh

builds:
  - main: ./cmd/ccswitch
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # main.version is consumed by versionString() in cmd/ccswitch/main.go.
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - completions/*
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  abbrev: -1
  groups:
    - title: Features
      regexp: '^.*?(feat|new)(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999
  filters:
    # Scope-tolerant: release-please's own merge commit is `chore(main): ...`
    # and must not land under "Other".
    exclude:
      - '^docs(\(.+\))?:'
      - '^test(\(.+\))?:'
      - '^chore(\(.+\))?:'
      - '^ci(\(.+\))?:'
      - "^Merge "

release:
  draft: false
  # release-please creates the GitHub release first, with link-heavy notes;
  # replace overwrites its body with the grouped hash-free changelog above.
  mode: replace
