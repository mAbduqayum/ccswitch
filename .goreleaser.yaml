# GoReleaser config — https://goreleaser.com
# Cut a release by pushing a tag: `git tag v1.2.3 && git push origin v1.2.3`.
version: 2

project_name: ccswitch

before:
  hooks:
    - go mod tidy
    - ./scripts/completions.sh

builds:
  - main: ./cmd/ccswitch
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # main.version is consumed by versionString() in cmd/ccswitch/main.go.
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - completions/*
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  abbrev: -1
  groups:
    - title: Features
      regexp: '^.*?(feat|new)(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
