name: release-please

on:
  push:
    branches: ["main"]

# issues: write lets the bot create its autorelease tracking labels.
permissions:
  contents: write
  issues: write
  pull-requests: write

# Never cancel-in-progress: killing a run mid-tag/release is worse than queuing.
concurrency:
  group: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  # Runs here rather than in a tag-triggered workflow: tags created with
  # GITHUB_TOKEN never trigger other workflows.
  goreleaser:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so GoReleaser can build the changelog
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
